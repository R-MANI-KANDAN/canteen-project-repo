<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LICET Cafeteria - Register</title>
  <link rel="stylesheet" href="styles-signup.css"> <!-- Use styles-signup.css for register -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Logo and Title at top left corner -->
  <div class="logo-container">
    <img src="Images/Landing Page/licet_logo.png" alt="LICET Cafeteria Logo" class="logo">
    <h1>LICET Cafeteria</h1>
  </div>

  <!-- Left Side GIF -->
  <div class="gif-panel">
    <img src="LICET login.gif" alt="LICET Animation">
  </div>

  <!-- Right Side Registration Section -->
  <div class="signup-container">
    <div class="signup-content">
      <!-- Welcome Message -->
      <div class="welcome-message">
        <h2>Welcome to LICET Cafeteria Pre-Ordering System</h2>
      </div>

      <!-- Registration Form -->
      <form class="signup-form">
        <h2>Login</h2>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div class="divider">or</div>
        <button class="google-btn">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
          Continue with Google
        </button>
        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>
</body>
</html>
